# ==============================================================================
# Filename: globals/endpoints.yaml
# Description: Global endpoints keyed by refModuleName for O(1) JIT lookups
# ==============================================================================
endpoints:
  to-json:
    label: "Target Request (HTTP JSON)"
    type: HttpUpstream
    telegram: json-standard
    profile: upstream-sync-transient-alt
    retry:
      enabled: false
    config:
      host: localhost
      port: 51101
      requestContentType: application/json
      requestEncoding: utf-8
      responseEncoding: utf-8

  to-xml:
    label: "Target Request (HTTP XML)"
    type: HttpUpstream
    telegram: xml-tcp-delimiter
    profile: upstream-sync-transient-alt
    retry:
      enabled: false
    config:
      host: localhost
      port: 51101
      requestContentType: application/xml
      requestEncoding: utf-8
      responseEncoding: utf-8