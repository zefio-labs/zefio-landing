# ==============================================================================
# Filename: globals/profiles.yaml
# Description: Global connection profiles and integration templates for Zefio
# ==============================================================================
profiles:
  # ==========================================
  # [Server/Ingress - Receiver]
  # ==========================================
  # 💡 Sync receive only: Keeps session to return response
  ingress-sync:
    config:
      workThreadCount: 16
      connectTimeout: 5000
      soKeepAlive: true
      tcpNoDelay: true
      soReUseAddr: true
      readTimeout: 10000
      transactionTimeoutMillis: 15000
      responseMatchingType: session
      keepAlive: true

  # 💡 Async receive only
  ingress-async:
    config:
      workThreadCount: 16
      connectTimeout: 5000
      soKeepAlive: true
      tcpNoDelay: true
      soReUseAddr: true
      readTimeout: 10000
      transactionTimeoutMillis: 15000
      responseMatchingType: telegram
      keepAlive: true

  # ==========================================
  # [Client/Upstream - Sender POOLED]
  # ==========================================
  # 💡 Massive sync sender (1,000 Pool)
  upstream-sync-massive:
    config:
      workThreadCount: 16
      connectTimeout: 3000
      soKeepAlive: true
      tcpNoDelay: true
      soReUseAddr: true
      readTimeout: 0
      transactionTimeoutMillis: 10000
      responseMatchingType: session
      keepAlive: true
      poolMaxSize: 1000
      poolMaxWaitMillis: 3000
      poolReconnectIntervalMillis: 1000
      poolFillIntervalMillis: 100
      lifo: false
      timeBetweenEvictionRunsDurationMillis: 30000
      minEvictableIdleDurationMillis: 60000

  # 💡 Small sync sender (10 Pool) - 🌟 Newly recommended
  upstream-sync-standard:
    config:
      workThreadCount: 16
      connectTimeout: 2000
      soKeepAlive: true
      tcpNoDelay: true
      soReUseAddr: true
      readTimeout: 0
      transactionTimeoutMillis: 10000
      responseMatchingType: session
      keepAlive: true
      poolMaxSize: 10
      poolMaxWaitMillis: 1000
      poolReconnectIntervalMillis: 1000
      poolFillIntervalMillis: 1000
      lifo: false
      timeBetweenEvictionRunsDurationMillis: 30000
      minEvictableIdleDurationMillis: 60000

  # 💡 Small async sender (10 Pool)
  upstream-async-standard:
    config:
      workThreadCount: 16
      connectTimeout: 2000
      soKeepAlive: true
      tcpNoDelay: true
      soReUseAddr: true
      readTimeout: 0
      transactionTimeoutMillis: 10000
      responseMatchingType: telegram
      keepAlive: true
      poolMaxSize: 10
      poolMaxWaitMillis: 500
      poolReconnectIntervalMillis: 1000
      poolFillIntervalMillis: 1000
      lifo: false
      timeBetweenEvictionRunsDurationMillis: 30000
      minEvictableIdleDurationMillis: 60000

  # ==========================================
  # [Client/Upstream - Sender TRANSIENT]
  # ==========================================
  # 💡 Sync transient sender
  upstream-sync-transient:
    config:
      workThreadCount: 8
      connectTimeout: 3000
      soKeepAlive: false
      tcpNoDelay: true
      soReUseAddr: true
      readTimeout: 5000
      transactionTimeoutMillis: 10000
      responseMatchingType: session
      keepAlive: false
      poolMaxSize: 0
      onceMaxRetries: 3
      onceTryTimeoutMillis: 2000
      onceBackoffDelayMillis: 500

  # ==========================================
  # Composite Profiles & Integration Templates
  # ==========================================
  # 💡 Alternative profile from composite (keepAlive: false)
  ingress-sync-alt:
    config:
      workThreadCount: 16
      connectTimeout: 5000
      soKeepAlive: true
      tcpNoDelay: true
      soReUseAddr: true
      readTimeout: 10000
      transactionTimeoutMillis: 15000
      responseMatchingType: session
      keepAlive: false

  # 1. Default timeout and retry template for external API integration
  upstream-api-unstable:
    exchangePattern: RequestReply
    retry:
      enabled: true
      maxRetries: 1      # 💡 First line of defense at leaf level
      delay: 100
    config:
      readTimeout: 3000
      connectionTimeout: 1000

  # 2. High-speed template for internal local DB integration
  upstream-local-db:
    exchangePattern: RequestReply
    retry:
      enabled: false     # Fail immediately on DB clash
    config:
      queryTimeout: 1000

  # 💡 Sync transient sender (Alternative profile from composite with exchangePattern)
  upstream-sync-transient-alt:
    exchangePattern: RequestReply
    config:
      workThreadCount: 8
      connectTimeout: 3000
      soKeepAlive: false
      tcpNoDelay: true
      soReUseAddr: true
      readTimeout: 5000
      transactionTimeoutMillis: 10000
      responseMatchingType: session
      keepAlive: false
      poolMaxSize: 0
      onceMaxRetries: 3
      onceTryTimeoutMillis: 2000
      onceBackoffDelayMillis: 500
