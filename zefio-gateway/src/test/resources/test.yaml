- name: httpInbound_multipart
  type: HttpIngress
  config:
    port: 53008
    requestEncoding: "utf-8"
    responseEncoding: "utf-8"
    responseContentType: multipart/form-data
    readTimeout: 5000
    transactionTimeoutMillis: 4000
    responseMatchingType: telegram

- name: httpOutbound_multipart
  type: HttpUpstream
  config:
    host: "127.0.0.1"
    port: 53008
    requestPath: "upload"
    responseMatchingType: telegram
    requestContentType: multipart/form-data
    requestHttpMethod: "POST"
    requestQueryParams: ""
    requestHeaderKeyconfig: "zefio-gid:{{hostname}}-T_CRE_PIE_RQ_QUE"
    requestEncoding: "utf-8"
    responseEncoding: "utf-8"
    transactionTimeoutMillis: 10000

- name: httpInbound_fixed
  type: HttpIngress
  config:
    port: 53007
    requestEncoding: "utf-8"
    responseEncoding: "utf-8"
    responseContentType: "text/plain"     # MediaType.TEXT_PLAIN.toString()
    readTimeout: 5000                     # in milliseconds
    transactionTimeoutMillis: 4000        # in milliseconds
    responseMatchingType: telegram

- name: httpOutbound_fixed
  type: HttpUpstream
  config:
    host: "127.0.0.1"
    port: 53007
    requestPath: "0-8,echo"               # "/echo{TXN_ID}" 방식
    responseMatchingType: telegram
    requestContentType: "text/plain"      # MediaType.TEXT_PLAIN.toString()
    requestAccept: "text/plain"
    requestHttpMethod: "POST"
    requestQueryParams: ""
    requestHeaderKeyconfig: "zefio-gid:{{hostname}}-{{CorrelationID}}"
    requestEncoding: "utf-8"
    responseEncoding: "utf-8"
    transactionTimeoutMillis: 5000

