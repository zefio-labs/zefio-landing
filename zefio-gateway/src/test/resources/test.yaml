- name: tcpInbound_encoding
  type: TcpIngress
  config:
    port: 39990
    requestEncoding: US-ASCII   # 또는 US-ASCII 등
    responseEncoding: US-ASCII
    readTimeout: 0
    transactionTimeoutMillis: 11000
    # --------------------------------------------------------------------------
    # Response Matching Strategy Configuration
    # - none: Fire-and-Forget mode (Async, No response expected)
    # - session: Matches response using Network Session (Channel ID + Remote Address)
    # - telegram: Matches response using a Correlation Key within the message body
    # --------------------------------------------------------------------------
    responseMatchingType: telegram
    keepAlive: true

- name: tcpOutbound_encoding
  type: TcpUpstream
  config:
    host: 127.0.0.1
    port: 39990
    requestEncoding: US-ASCII   # 인코딩을 문자열로 지정
    responseEncoding: US-ASCII
    transactionTimeoutMillis: 5000
    # --------------------------------------------------------------------------
    # Response Matching Strategy Configuration
    # - none: Fire-and-Forget mode (Async, No response expected)
    # - session: Matches response using Network Session (Channel ID + Remote Address)
    # - telegram: Matches response using a Correlation Key within the message body
    # --------------------------------------------------------------------------
    responseMatchingType: telegram

