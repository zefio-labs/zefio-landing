- name: xml1
  type: XmlFaultHandler
  config:
    errorCodeRules:
      - errorCode: "E123"
        key: "code"        # 에러코드 치환 대상 key
        newCode: "ABC"
    valueOverrides:
      - key: "desc"
        value: "xml override"
    messageRule:
      mode: "ERROR"
      key: "errorMessage"  # prefix 병합용 별도 key
    requestEncoding: "utf-8"
