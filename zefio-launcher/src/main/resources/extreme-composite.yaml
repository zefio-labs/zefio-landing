# ==============================================================================
# 파일명: composite.yml
# 설  명: Spring Boot 엔진 기동 시 가장 먼저 읽어 들이는 엔트리포인트.
#         v2.5의 도메인 분할(Imports) 사상이 적용되어 있습니다.
# ==============================================================================
server:
  port: 52001

management:
  health:
    jms:
      enabled: false
  endpoints:
    web:
      exposure:
        include: "*"
      path-mapping:
        health: health

zefio:
  # ==========================================
  # Node Identification
  # ==========================================
  node:
    id: ${ZEFIO_NODE_ID:DP-02}
    group: ${ZEFIO_NODE_GROUP:main}

  # ==========================================
  # Control Plane (CP) Telemetry Configuration
  # ==========================================
  cp:
    api-url: http://192.168.0.11:3000
    enabled: true
    redis:
      url: redis://192.168.0.41:6379/0
    metrics:
      push-interval-ms: 3000

spring:
  main:
    banner-mode: log
  config:
    import:
      - classpath:globals/endpoints.yaml
      - classpath:globals/monitor.yaml
      - classpath:globals/system.yaml
      - classpath:globals/global-options.yaml
      - classpath:globals/errors.yaml

imports:
  - "classpath:globals/endpoints.yaml"
  - "classpath:globals/monitor.yaml"
  - "classpath:globals/system.yaml"
  - "classpath:globals/global-options.yaml"
  - "classpath:globals/errors.yaml"
  - "classpath:globals/profiles.yaml"
  - "classpath:globals/telegrams.yaml"

  - "classpath:flows/flow-router-modify.yaml"
  - "classpath:flows/flow-switch-orchestration.yaml"
  - "classpath:flows/flow-vm-modify.yaml"
  - "classpath:flows/flow-tryscope-retry.yaml"
  - "classpath:flows/flow-tryscope-conditional.yaml"
  - "classpath:flows/flow-spel-loopback.yaml"

  - "classpath:flows/flow-tryscope-basic.yaml"
  - "classpath:flows/flow-scatter-basic.yaml"
  - "classpath:flows/flow-extreme-composite.yaml"
