flows:
  - name: ingress
    label: "8번_HTTP_TO_TCP_고대기열"
    options:
      threadPool:
        corePoolSize: 300
        maxPoolSize: 500
        queueCapacity: 0
        autoScaling:
          enabled: true
          threshold: 0.5
          checkInterval: 5
          scaleUpStep: 50
          scaleDownStep: 20
      cpuQueue:
        capacity: 100000
      ioQueue:
        capacity: 50000

    # 🎯 수신부: 동기(sync)
    ingress:
      name: from
      label: "HTTP 수신(51008)"
      type: HttpIngress
      telegram: fixed-standard
      profile: ingress-sync
      exchangePattern: RequestReply
      config:
        port: 51008
        requestEncoding: utf-8
        responseEncoding: utf-8
        # 🚀 [비즈니스 특화] HTTP 응답 헤더
        responseContentType: text/plain

    # 🎯 송신부: 비동기(async, telegram matching) 10 Pool
    steps:
      - name: to
        label: "타겟 요청(TCP_Small)"
        type: TcpUpstream
        telegram: fixed-standard
        profile: upstream-async-standard
        exchangePattern: RequestReply
        retry:
          enabled: false
        config:
          host: localhost
          port: 51108
          requestEncoding: utf-8
          responseEncoding: utf-8
    on-error:
      - error-type: ANY
        refErrorHandler: fixederror
