# ==============================================================================
# 파일명: flows/flow-router-modify.yaml
# 설  명: [v2.6] HTTP-to-Fixed 중계 및 대외계 연동 에러 격리 플로우
# ==============================================================================
flows:
  - name: flow-main
    label: "HTTP 수신 및 Fixed 변환 중계 플로우"
    options:
      threadPool:
        corePoolSize: 1000
        maxPoolSize: 2000
        queueCapacity: 2000
        autoScaling:
          enabled: true
          threshold: 0.5
          checkInterval: 5
          scaleUpStep: 2
          scaleDownStep: 1
      cpuQueue:
        capacity: 10000
      ioQueue:
        capacity: 5000

    ingress:
      name: from-http-51001
      label: "HTTP 소스 수신(51001)"
      type: HttpIngress
      telegram: fixed-http-req
      profile: ingress-sync-alt
      exchangePattern: RequestReply
      config:
        keepAlive: false
        port: 51001
        requestEncoding: utf-8
        responseEncoding: utf-8
        responseContentType: text/plain
        responseMatchingType: session
        readTimeout: 50000
        transactionTimeoutMillis: 40000

    steps:
      # 🚀 [Phase 2] 가드레일 필터 장착 (최상단)
      # [Step 1] 가드레일 차단망
      - name: validate-payload
        label: "입력 페이로드 유효성 엄격 검사"
        type: SpELValidatorInterceptor
        config:
          # TARGET_VAL이 반드시 'ABC'여야만 통과, 아니면 즉시 차단
          condition: "#{body['TARGET_VAL'] == 'ABC'}"
          errorMessage: "Guardrail Blocked: TARGET_VAL must be 'ABC'"
          errorStatus: "VALIDATION_FAILED"

      # 🚀 [Phase 3] 데이터 연금술
      # [Step 2] 데이터 연금술
      - name: modify-fixed-body
        label: "오프셋 3번지 데이터 치환 (XYZ)"
        type: SpELModifierInterceptor
        config:
          assignments:
            # [1] ABC -> XYZ
            - target: "body['TARGET_VAL']"
              expression: "#{'XYZ'}"

            # [2] REQ -> RES (여기 때문에 RESXYZ가 됨)
            - target: "body['PREFIX']"
              expression: "#{body['PREFIX'] == 'REQ' ? 'RES' : 'ERR'}"

            # [3] Property 대피 (Alchemy)
            - target: "payload.headers['ORIGIN_TRX_ID']"
              expression: "#{body['GLOBAL_TRX_ID']}"

            # 🚀 [수정] #{}를 감싸야 수식으로 실행됩니다!
            - target: "body['DUMMY_HEADER']"
              expression: "#{T(java.lang.String).format('TS:%d-ID:%s', T(java.lang.System).currentTimeMillis(), T(java.util.UUID).randomUUID().toString().substring(0,8))}"

            # [5] 수치 연산
            - target: "payload.headers['COMPLEX_SCORE']"
              expression: "#{100 * 1.5 + (body['TARGET_VAL'] == 'ABC' ? 50 : 10)}"

      # 🚀 [Phase 3] 잃어버린 연결 고리: 프로퍼티를 HTTP 응답 헤더로 매핑
      # [Step 3] 🚀 메타데이터 전이
      - name: sync-to-http-header
        label: "내부 프로퍼티 응답 헤더 노출"
        type: HttpHeaderValeSetter
        config:
          targetType: RESPONSE # 💡 RESPONSE -> PayloadHeaders.HTTP_RESPONSE_PREFIX (http.res.) 사용
          headerKeyValues:
            X-ORIGIN-TRX-ID: "#{payload.headers['ORIGIN_TRX_ID']}"
            X-COMPLEX-SCORE: "#{payload.headers['COMPLEX_SCORE']}"
            # 💡 보너스: 현재 시간을 헤더에 직접 박는 것도 가능해집니다.
            X-PROC-TIME: "#{T(java.lang.System).currentTimeMillis()}"

      # ========================================================================
      # 🛡️ [Step 4] 대외계 연동 에러 격리 스코프 (High-Risk Zone)
      # ========================================================================
      - name: external-routing-scope
        type: TRY_SCOPE

        # 🔄 [시간의 축] 타겟 서버 장애 시 3회 재시도
        retry:
          enabled: true
          maxRetries: 3
          delay: 500

        # 🛡️ [공간의 축] 최종 실패 시 클라이언트 연결을 끊지 않고 전문 규격 복원
        on-error: FALLBACK

        # 🏃 [정상 경로] 동적 라우팅 수행
        steps:
          - name: route-to-target
            label: "타겟 동적 분기 라우터"
            type: SpELRouterInterceptor
            config:
              routingRules:
                # 원본 TRX_ID가 TRX-9999로 시작하면 XML 타겟으로 쏜다!
                - name: "Route to XML"
                  condition: "#{payload.headers['ORIGIN_TRX_ID'].startsWith('TRX-9999')}"
                  refModuleName: "to-xml"
                # 원본 TRX_ID가 TRX-JSON으로 시작하면 JSON 타겟으로 쏜다!
                - name: "Route to JSON"
                  condition: "#{payload.headers['ORIGIN_TRX_ID'].startsWith('TRX-JSON')}"
                  refModuleName: "to-json"

        # 🚑 [우회 경로] 라우팅 실패 혹은 타겟 서버 타임아웃 시 작동
        fallback-steps:
          - name: build-error-response
            label: "대외계 연동 실패 시 전문 조립"
            type: SpELModifierInterceptor
            config:
              assignments:
                # PREFIX를 ERR로 마킹하고, DUMMY_HEADER 영역에 에러 메시지 삽입 (치료 프로세스)
                - target: "body['PREFIX']"
                  expression: "#{'ERR'}"
                - target: "body['DUMMY_HEADER']"
                  expression: "'Call Failed: ' + (#exception != null ? #exception.message : 'Unknown')"
                - target: "body['GLOBAL_TRX_ID']"
                  expression: "#{payload.trxID}"

    on-error:
      - error-type: ANY
        refErrorHandler: fixederror
