# ==============================================================================
# 파일명: flows/flow-scatter-basic.yaml
# 설  명: [v2.6] SCATTER_GATHER 병렬 취합 및 계층형 에러 제어 검증
# ==============================================================================
flows:
  - name: scatter-basic-flow
    label: "SCATTER_GATHER 단일 검증 플로우"
    options:
      threadPool:
        corePoolSize: 10
        maxPoolSize: 20
        queueCapacity: 50

    ingress:
      name: from-client-scatter-51002
      label: "HTTP 클라이언트 수신"
      type: HttpIngress
      telegram: fixed-http-req
      profile: ingress-sync-alt
      exchangePattern: RequestReply
      config:
        keepAlive: false
        port: 51002
        requestEncoding: utf-8
        responseEncoding: utf-8
        responseContentType: text/plain
        responseMatchingType: session
        readTimeout: 50000
        transactionTimeoutMillis: 40000

    steps:
      # ========================================================================
      # 🛡️ 외곽 스코프: 병렬 처리 전체 과정에서 터지는 예외 격리
      # ========================================================================
      - name: scatter-isolation-scope
        type: TRY_SCOPE
        on-error: FALLBACK # 🚀 전체 취합 실패 시 우회 경로 실행

        steps:
          - name: basic-scatter-gather
            type: SCATTER_GATHER
            label: "3개 브랜치 병렬 실행 및 취합"
            config:
              timeout: 3000
              aggregationType: MAP_MERGE  # 브랜치 결과를 Map으로 묶어 직렬화
              errorPolicy: FAIL_FAST # 💡 하나라도 터지면 TRY_SCOPE 가 작동하게 함
            steps:
              # 🌿 브랜치 1: 성공 (단순 통과)
              - name: branch-a-success
                type: SpELModifierInterceptor
                config:
                  assignments:
                    - target: "payload.headers['BRANCH_A']"
                      expression: "#{'SUCCESS'}"

              # 🔥 브랜치 B: 재시도 후 에러 발생 (TRY_SCOPE 중첩)
              - name: branch-b-retry-scope
                type: TRY_SCOPE
                retry:
                  enabled: true # 🚀 [핵심] 브랜치별로 재시도 여부 결정
                  maxRetries: 3
                  delay: 200
                on-error: THROW # 💡 3번 다 실패하면 Scatter에게 에러 보고
                steps:
                  - name: branch-b-fail
                    type: SpELValidatorInterceptor
                    config:
                      condition: "#{false}"
                      errorMessage: "Forced Error in Branch B"
                      errorStatus: "TIMEOUT" # 💡 재시도를 유발하기 위해 TIMEOUT 위장

              # 🌿 브랜치 3: 성공 (단순 통과)
              - name: branch-c-success
                type: SpELModifierInterceptor
                config:
                  assignments:
                    - target: "payload.headers['BRANCH_C']"
                      expression: "#{'SUCCESS'}"

        # 🚑 [전체 우회 경로] 취합된 데이터가 엉망이거나 에러 시 복구 로직
        fallback-steps:
          - name: fallback-restore-format
            type: SpELModifierInterceptor
            config:
              assignments:
                - target: "body['PREFIX']"
                  expression: "#{'RES'}"
                - target: "body['TARGET_VAL']"
                  expression: "#{'S_G'}"
                - target: "body['DUMMY_HEADER']"
                  expression: "#{'Aggregated with Partial Failures'}"
                - target: "body['GLOBAL_TRX_ID']"
                  expression: "#{payload.trxID}"

      # 📊 최종 결과 로그 확인
      - name: log-merged-body
        type: LoggingInterceptor
        config: { }

    on-error:
      - error-type: ANY
        refErrorHandler: fixederror
