flows:
  - name: flow-main
    label: "HTTP 수신 및 Fixed 변환 중계 플로우"
    options:
      threadPool:
        corePoolSize: 1000
        maxPoolSize: 2000
        queueCapacity: 2000
        autoScaling:
          enabled: true
          threshold: 0.5
          checkInterval: 5
          scaleUpStep: 2
          scaleDownStep: 1
      cpuQueue:
        capacity: 10000
      ioQueue:
        capacity: 5000

    ingress:
      name: from-http-51006
      label: "HTTP 소스 수신(51006)"
      type: HttpIngress
      telegram: fixed-http-req
      profile: ingress-sync-alt
      exchangePattern: RequestReply
      config:
        keepAlive: false
        port: 51006
        requestEncoding: utf-8
        responseEncoding: utf-8
        responseContentType: text/plain
        responseMatchingType: session
        readTimeout: 50000
        transactionTimeoutMillis: 40000

    steps:
      # 🚀 [Phase 2] 가드레일 필터 장착 (최상단)
      # [Step 1] 가드레일 차단망 (순수 CPU 연산 - 에러 시 즉시 글로벌 DLQ로 던짐)
      - name: validate-payload
        label: "입력 페이로드 유효성 엄격 검사"
        type: SpELValidatorInterceptor
        config:
          # TARGET_VAL이 반드시 'ABC'여야만 통과, 아니면 즉시 차단
          condition: "#{body['TARGET_VAL'] == 'ABC'}"
          errorMessage: "Guardrail Blocked: TARGET_VAL must be 'ABC'"
          errorStatus: "VALIDATION_FAILED"

      # 🚀 [Phase 3] 데이터 연금술
      # [Step 2] 데이터 연금술
      - name: modify-fixed-body
        label: "오프셋 3번지 데이터 치환 (XYZ)"
        type: SpELModifierInterceptor
        retry:
          enabled: false
        config:
          assignments:
            # [1] ABC -> XYZ
            - target: "body['TARGET_VAL']"
              expression: "#{'XYZ'}"

            # [2] REQ -> RES (여기 때문에 RESXYZ가 됨)
            - target: "body['PREFIX']"
              expression: "#{body['PREFIX'] == 'REQ' ? 'RES' : 'ERR'}"

            # [3] Property 대피 (Alchemy)
            - target: "payload.headers['ORIGIN_TRX_ID']"
              expression: "#{body['GLOBAL_TRX_ID']}"

            # 🚀 [수정] #{}를 감싸야 수식으로 실행됩니다!
            - target: "body['DUMMY_HEADER']"
              expression: "#{T(java.lang.String).format('TS:%d-ID:%s', T(java.lang.System).currentTimeMillis(), T(java.util.UUID).randomUUID().toString().substring(0,8))}"

            # [5] 수치 연산
            - target: "payload.headers['COMPLEX_SCORE']"
              expression: "#{100 * 1.5 + (body['TARGET_VAL'] == 'ABC' ? 50 : 10)}"

      # 🚀 [Phase 3] 잃어버린 연결 고리: 프로퍼티를 HTTP 응답 헤더로 매핑
      # [Step 3] 🚀 메타데이터 전이
      - name: sync-to-http-header
        label: "내부 프로퍼티 응답 헤더 노출"
        type: HttpHeaderValeSetter
        config:
          targetType: RESPONSE # 💡 RESPONSE -> PayloadHeaders.HTTP_RESPONSE_PREFIX (http.res.) 사용
          headerKeyValues:
            X-ORIGIN-TRX-ID: "#{payload.headers['ORIGIN_TRX_ID']}"
            X-COMPLEX-SCORE: "#{payload.headers['COMPLEX_SCORE']}"
            # 💡 보너스: 현재 시간을 헤더에 직접 박는 것도 가능해집니다.
            X-PROC-TIME: "#{T(java.lang.System).currentTimeMillis()}"

      # ==============================================================================
      # 🛡️ [Step 4] 🚀 에러 격리 스코프 (타 서버 통신 구간 보호)
      # ==============================================================================
      - name: safe-dynamic-call
        label: "안전한 동적 라우팅 스코프"
        type: TRY_SCOPE

        # 1. [시간의 축] 대상 VM 서버 응답 지연 시 3회까지 자체 재시도
        retry:
          enabled: true
          maxRetries: 3
          delay: 500

        # 2. [공간의 축] 3회 재시도마저 실패하면 클라이언트(HTTP) 연결을 끊지 않고 우회 경로 실행
        on-error: FALLBACK

        # 3. [정상 경로] 서브 플로우 동적 호출
        steps:
          # 🚀 [Step 4] DYNAMIC VM OUTBOUND (동적 마이크로서비스 호출)
          - name: dynamic-orchestrator
            label: "서브 플로우 동적 호출기"
            type: DynamicLocalUpstream
            config:
              # 💡 삼항 연산자를 활용하여 런타임에 목적지 서브 플로우의 이름을 조립(결정)합니다.
              # TRX-9999로 시작하면 'flow-target-xml', 아니면 'flow-target-json' 이라는 문자열을 반환합니다.
              # 💡 [해결책] 무조건 한 줄(Single-line)로 작성하여 '}' 뒤에 개행문자가 붙는 것을 차단합니다!
              targetFlowExpression: "#{payload.headers['ORIGIN_TRX_ID'].startsWith('TRX-9999') ? 'flow-target-xml' : 'flow-target-json'}"
              timeout: 30000

        # 4. [우회 경로] 에러 발생 시 실행되는 플랜 B (클라이언트에게 우아한 에러 응답)
        fallback-steps:
            - name: build-error-response
              label: "동적 호출 실패 시 에러 전문 조립"
              type: SpELModifierInterceptor
              config:
                assignments:
                  # 에러 코드를 세팅하고, Phase 4에서 만든 #exception 변수를 활용해 에러 사유를 바디에 삽입
                  - target: "body['PREFIX']"
                    expression: "'ERR'"
                  - target: "body['ERR_REASON']"
                    expression: "'대상 마이크로서비스 호출 실패: ' + #exception.message"

    # ==============================================================================
    # 💥 최상위 글로벌 에러 핸들러 (DLQ)
    # 가드레일(Step 1)에서 막히거나, 문법 오류로 TryScope 밖에서 터진 에러를 주워 담음
    # ==============================================================================
    on-error:
      - error-type: ANY
        refErrorHandler: fixederror


  # ==============================================================================
  # 🚀 [Sub-Flow 1] XML 타겟 전담 마이크로서비스
  # ==============================================================================
  - name: flow-target-xml
    label: "XML 엔드포인트 전담 중계 플로우"
    ingress:
      name: vm-inbound-xml
      type: LocalIngress                 # 내부 통신용 더미 타입
      telegram: fixed-http-req   # 메인 플로우와 동일한 텔레그램 스펙 유지
    steps:
      - name: call-global-xml
        label: "글로벌 XML 엔드포인트 호출"
        type: SpELRouterInterceptor
        config:
          routingRules:
            # 💡 서브 플로우 내부에서는 무조건(#{true}) 매핑된 글로벌 엔드포인트를 호출합니다.
            - name: "Direct to XML Endpoint"
              condition: "#{true}"
              refModuleName: "to-xml"

  # ==============================================================================
  # 🚀 [Sub-Flow 2] JSON 타겟 전담 마이크로서비스
  # ==============================================================================
  - name: flow-target-json
    label: "JSON 엔드포인트 전담 중계 플로우"
    ingress:
      name: vm-inbound-json
      type: LocalIngress
      telegram: fixed-http-req
    steps:
      - name: call-global-json
        label: "글로벌 JSON 엔드포인트 호출"
        type: SpELRouterInterceptor
        config:
          routingRules:
            # 💡 서브 플로우 내부에서는 무조건(#{true}) 매핑된 글로벌 엔드포인트를 호출합니다.
            - name: "Direct to JSON Endpoint"
              condition: "#{true}"
              refModuleName: "to-json"
