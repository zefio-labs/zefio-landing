# ==============================================================================
# 파일명: globals/endpoints.yaml
# 설  명: 라우터나 다른 플로우에서 공통으로 참조(refModuleName)할 전역 엔드포인트
# ==============================================================================
endpoints:
  - name: to-json
    label: "타겟 요청(HTTP JSON)"
    type: HttpUpstream
    telegram: json-standard
    profile: upstream-sync-transient-alt
    retry:
      enabled: false
    config:
      host: localhost
      port: 51101
      requestContentType: application/json
      requestEncoding: utf-8
      responseEncoding: utf-8

  - name: to-xml
    label: "타겟 요청(HTTP XML)"
    type: HttpUpstream
    telegram: xml-tcp-delimiter
    profile: upstream-sync-transient-alt
    retry:
      enabled: false
    config:
      host: localhost
      port: 51101
      requestContentType: application/xml
      requestEncoding: utf-8
      responseEncoding: utf-8
